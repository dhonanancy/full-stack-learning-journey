<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    body {
      background: #d3d3d3; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: linear-gradient(to bottom right, #add8e6, #87cefa); /* Light blue gradient */
      border: 3px solid #4682b4;
      border-radius: 25px;
      padding: 20px;
      width: 280px;
      box-sizing: border-box;
    }

    .display {
      background-color: white;
      height: 60px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 1.8em;
      text-align: right;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      background-color: white;
      border: 2px solid black; 
      border-radius: 15px;
      font-size: 1.2em;
      padding: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:active {
      background-color: #e3e3e3;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button onclick="clearAll()">AC</button>
      <button onclick="clearEntry()">C</button>
      <button onclick="append('/')">/</button>
      <button onclick="append('')"></button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('-')">-</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('+')">+</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="calculate()">=</button>

      <button onclick="append('0')" style="grid-column: span 2">0</button>
      <button onclick="append('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');

    function append(value) {
      if (display.innerText === '0') display.innerText = value;
      else display.innerText += value;
    }

    function clearAll() {
      display.innerText = '0';
    }

    function clearEntry() {
      display.innerText = display.innerText.slice(0, -1) || '0';
    }

    function calculate() {
      try {
        display.innerText = eval(display.innerText);
      } catch {
        display.innerText = 'Error';
      }
    }
  </script>
</body>
</html>
