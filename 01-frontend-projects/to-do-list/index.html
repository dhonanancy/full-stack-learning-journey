<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creative To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .todo-container {
      background: #fff;
      width: 400px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      padding: 30px;
      transition: all 0.3s ease-in-out;
    }

    .todo-container h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .input-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .input-section input {
      flex: 1;
      padding: 10px;
      border: 2px solid #a084dc;
      border-radius: 10px;
      margin-right: 10px;
      outline: none;
      font-size: 16px;
    }

    .input-section button {
      background-color: #a084dc;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .input-section button:hover {
      background-color: #8461c4;
    }

    ul {
      list-style: none;
      max-height: 250px;
      overflow-y: auto;
      padding-right: 5px;
    }

    ul::-webkit-scrollbar {
      width: 6px;
    }

    ul::-webkit-scrollbar-thumb {
      background-color: #a084dc;
      border-radius: 10px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f5f0ff;
      padding: 10px 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    li.completed {
      text-decoration: line-through;
      color: gray;
      background-color: #dedede;
    }

    li span {
      cursor: pointer;
      font-size: 18px;
    }

    li button {
      background: none;
      border: none;
      color: #ff5252;
      font-size: 20px;
      cursor: pointer;
    }

    li:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="todo-container">
    <h2>📝 My To-Do List</h2>
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();

      if (taskText === '') {
        alert('Please enter a task!');
        return;
      }

      const li = document.createElement('li');

      const span = document.createElement('span');
      span.textContent = taskText;
      span.onclick = function () {
        li.classList.toggle('completed');
      };

      const delBtn = document.createElement('button');
      delBtn.innerHTML = '🗑';
      delBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(span);
      li.appendChild(delBtn);
      document.getElementById('taskList').appendChild(li);

      input.value = '';
    }
  </script>
</body>
</html>
