<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connect Four Game</title>
  <style>
    body {
      background: linear-gradient(to right, #ffd6d6, #ffe8e8);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 60px);
      gap: 5px;
      margin-top: 20px;
    }

    .cell {
      width: 60px;
      height: 60px;
      background-color: #e0e0e0;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .cell.red {
      background-color: red;
    }

    .cell.yellow {
      background-color: gold;
    }

    #status {
      font-size: 18px;
      margin-top: 15px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 8px 16px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <h1>Connect Four</h1>
  <div id="status">Player 🔴's turn</div>
  <div id="board"></div>
  <button onclick="resetGame()">Restart</button>

  <script>
    const rows = 6;
    const cols = 7;
    const board = [];
    let currentPlayer = 'red';
    const boardElement = document.getElementById("board");
    const statusElement = document.getElementById("status");

    // Create cells and store references
    function createBoard() {
      boardElement.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        board[r] = [];
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          cell.dataset.row = r;
          cell.dataset.col = c;
          board[r][c] = cell;
          boardElement.appendChild(cell);
        }
      }

      boardElement.addEventListener('click', handleClick);
    }

    function handleClick(e) {
      const col = e.target.dataset.col;
      if (!col) return;

      for (let r = rows - 1; r >= 0; r--) {
        const cell = board[r][col];
        if (!cell.classList.contains("red") && !cell.classList.contains("yellow")) {
          cell.classList.add(currentPlayer);
          if (checkWinner(r, col)) {
            statusElement.innerText = `Player ${currentPlayer === 'red' ? '🔴' : '🟡'} wins!`;
            boardElement.removeEventListener('click', handleClick);
          } else {
            currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';
            statusElement.innerText = `Player ${currentPlayer === 'red' ? '🔴' : '🟡'}'s turn`;
          }
          break;
        }
      }
    }

    function checkWinner(row, col) {
      const directions = [
        [0, 1], [1, 0], [1, 1], [1, -1]
      ];
      const color = currentPlayer;

      for (const [dx, dy] of directions) {
        let count = 1;

        // Check in both directions
        for (let dir of [-1, 1]) {
          let r = parseInt(row) + dx * dir;
          let c = parseInt(col) + dy * dir;
          while (
            r >= 0 && r < rows &&
            c >= 0 && c < cols &&
            board[r][c].classList.contains(color)
          ) {
            count++;
            r += dx * dir;
            c += dy * dir;
          }
        }

        if (count >= 4) return true;
      }

      return false;
    }

    function resetGame() {
      currentPlayer = 'red';
      statusElement.innerText = "Player 🔴's turn";
      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
